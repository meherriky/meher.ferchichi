<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CERTIFICATS - MEHER FERCHICHI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; color: #333; line-height: 1.6; }

        /* --- BANDEAU PHOTO (Identique à l'accueil) --- */
        .grande-photo-banner {
            width: 100%; height: 300px;
            background-image: url('image-profil.png');
            background-size: cover; background-position: center;
            box-shadow: inset 0 0 80px 40px rgba(255, 255, 255, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }

        /* --- NAVIGATION (LE MENU QUE TU VEUX GARDER) --- */
        nav { background-color: #333; padding: 15px; text-align: center; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }
        nav a:hover { color: #00d1ff; }

        /* --- CONTENEUR PRINCIPAL --- */
        .main-container { max-width: 1200px; margin: 40px auto; padding: 20px; background: white; border-radius: 8px; }

        /* --- GRILLE DES CERTIFICATS --- */
        .grid-certifs { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; margin-top: 30px; }
        
        .cert-card {
            position: relative; height: 200px; background: #00122e; border-radius: 10px;
            overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer;
        }
        .cert-card img { width: 100%; height: 100%; object-fit: cover; }

        /* EFFET SURVOL (OVERLAY) */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 51, 102, 0.9); color: white;
            display: flex; align-items: center; justify-content: center; text-align: center;
            padding: 20px; opacity: 0; transition: 0.4s ease; transform: translateY(100%);
        }
        .cert-card:hover .overlay { opacity: 1; transform: translateY(0); }

        /* --- SYSTÈME DE ZOOM (MODALE) --- */
        #zoneZoom {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-box {
            display: flex; background: white; max-width: 1000px; width: 100%; 
            max-height: 85vh; border-radius: 10px; overflow: hidden;
        }
        .modal-img-side { flex: 1; background: #111; display: flex; align-items: center; justify-content: center; }
        .modal-img-side img { max-width: 100%; max-height: 80vh; object-fit: contain; }
        .modal-text-side { flex: 1; padding: 30px; overflow-y: auto; }

        @media (max-width: 800px) { .modal-box { flex-direction: column; } }
    </style>
</head>
<body>

    <div class="grande-photo-banner">
        <h1 style="font-size: 2.5rem; color: #003366; text-shadow: 1px 1px 5px white;">MEHER FERCHICHI</h1>
    </div>

    <nav>
        <a href="index.html">ACCUEIL</a>
        <a href="categorie-a.html">BIOGRAPHIE</a>
        <a href="categorie-b.html">CERTIFICAT</a>
        <a href="categorie-c.html">ALBUM</a>
        <a href="categorie-d.html">AUDIO</a>
        <a href="categorie-e.html">VIDEO</a>
        <a href="admin.html">Admin</a>
    </nav>

    <main class="main-container">
        <h2 style="color: #003366; border-bottom: 2px solid #003366; padding-bottom: 10px;">Mes Certifications</h2>
        
        <div class="grid-certifs">
            <div class="cert-card" onclick="ouvrirZoom('certif-asbu.jpg', 'ASBU Academy', 'Expertise en intégration de l\'IA pour les standards de qualité de l\'information. Formation avancée sur la vérification des faits et l\'innovation éditoriale.')">
                <img src="certif-asbu.jpg" alt="ASBU">
                <div class="overlay"><p><strong>ASBU Academy</strong><br>Voir les détails</p></div>
            </div>

            <div class="cert-card" onclick="ouvrirZoom('certif-ebu.jpg', 'EBU Academy', 'Stratégie de transformation digitale pour les médias de service public. Certification sur les nouveaux workflows et la gouvernance des contenus.')">
                <img src="certif-ebu.jpg" alt="EBU">
                <div class="overlay"><p><strong>EBU Academy</strong><br>Voir les détails</p></div>
            </div>
            
            </div>
    </main>

    <div id="zoneZoom">
        <span onclick="fermerZoom()" style="position:absolute; top:20px; right:30px; color:white; font-size:40px; cursor:pointer;">&times;</span>
        <div class="modal-box">
            <div class="modal-img-side"><img id="imgZoom" src=""></div>
            <div class="modal-text-side">
                <h2 id="titreZoom" style="color:#003366;"></h2>
                <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
                <p id="texteZoom"></p>
                <button onclick="fermerZoom()" style="margin-top:20px; padding:10px 20px; background:#CC0000; color:white; border:none; border-radius:5px; cursor:pointer;">Fermer</button>
            </div>
        </div>
    </div>

    <script>
        function ouvrirZoom(src, titre, texte) {
            document.getElementById('zoneZoom').style.display = "flex";
            document.getElementById('imgZoom').src = src;
            document.getElementById('titreZoom').innerText = titre;
            document.getElementById('texteZoom').innerText = texte;
        }
        function fermerZoom() { document.getElementById('zoneZoom').style.display = "none"; }
    </script>

</body>
</html>

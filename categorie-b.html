<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CERTIFICATES - MEHER FERCHICHI</title>
    <style>
        /* --- RESET & STYLE DE BASE (Identique Bio/Index) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #fff; color: #333; line-height: 1.8; }

        /* --- BANDEAU PHOTO (Identique) --- */
        .grande-photo-banner {
            width: 100%; height: 400px;
            background: #001f3f url('image profil.png') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .grande-photo-banner::after { content: ""; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); }
        .grande-photo-banner h1 {
            position: relative; z-index: 2; font-size: 3.5rem; color: white;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5); letter-spacing: 8px; text-transform: uppercase;
        }

        /* --- NAVIGATION (Lien CERTIFICATES allumé) --- */
        nav { background: #1a1a1a; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid #00d1ff; }
        nav a { color: rgba(255, 255, 255, 0.6); text-decoration: none; margin: 0 15px; font-weight: bold; transition: 0.3s; padding-bottom: 8px; font-size: 0.85rem; }
        nav a.active { color: #00d1ff; border-bottom: 2px solid #00d1ff; text-shadow: 0 0 8px #00d1ff; }
        nav a:hover { color: #00d1ff; }

        /* --- CONTENU PRINCIPAL --- */
        .main-container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; }
        h2.section-title { font-size: 2.2rem; color: #003366; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        /* --- GRILLE DE CERTIFICATS (4 PAR LIGNE) --- */
        .grid-certifs { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
            margin-top: 30px; 
        }

        .cert-card {
            position: relative; height: 180px; background: #00122e; border-radius: 8px;
            overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer;
            transition: transform 0.3s ease;
        }
        .cert-card:hover { transform: scale(1.03); }
        .cert-card img { width: 100%; height: 100%; object-fit: cover; }

        /* OVERLAY AU SURVOL */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 51, 102, 0.9); color: white;
            display: flex; align-items: center; justify-content: center; text-align: center;
            padding: 15px; opacity: 0; transition: 0.4s ease; transform: translateY(100%);
            font-size: 0.85rem; font-weight: bold;
        }
        .cert-card:hover .overlay { opacity: 1; transform: translateY(0); }

        /* --- MODALE DE ZOOM (AUX COULEURS DU SITE) --- */
        #zoneZoom {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-box {
            display: flex; background: white; max-width: 1000px; width: 100%; 
            max-height: 85vh; border-radius: 10px; overflow: hidden; position: relative;
        }
        .modal-img-side { flex: 1.2; background: #111; display: flex; align-items: center; justify-content: center; }
        .modal-img-side img { max-width: 100%; max-height: 80vh; object-fit: contain; }
        .modal-text-side { flex: 1; padding: 40px; overflow-y: auto; }
        .modal-text-side h2 { color: #003366; margin-bottom: 15px; font-size: 1.5rem; border-bottom: 2px solid #00d1ff; padding-bottom: 10px; }

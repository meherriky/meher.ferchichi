<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDIO PRODUCTION - MEHER FERCHICHI</title>
    <style>
        /* --- BASE & THÈME SOMBRE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f1015; 
            color: #fff; 
            line-height: 1.6;
        }

        /* --- BANDEAU PHOTO (VERSION STABLE) --- */
        .grande-photo-banner {
            width: 100%; height: 300px;
            position: relative;
            background: #111;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .grande-photo-banner img {
            position: absolute; width: 100%; height: 100%; object-fit: cover;
            opacity: 0.6; /* Pour que le nom soit lisible */
        }
        .grande-photo-banner h1 {
            position: relative; z-index: 2;
            font-size: 3rem; color: #fff;
            text-shadow: 0 0 15px rgba(0, 209, 255, 0.7);
            letter-spacing: 5px;
        }

        /* --- NAVIGATION --- */
        nav { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid #00d1ff; }
        nav a { color: #fff; text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }
        nav a:hover { color: #00d1ff; }

        /* --- CONTENEUR --- */
        .main-container { max-width: 1200px; margin: 40px auto; padding: 20px; }

        /* --- GRILLE 2 COLONNES --- */
        .grid-audio {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .audio-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #333;
